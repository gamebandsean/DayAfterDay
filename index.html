<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day After Day - Life Sim</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <!-- Destiny Display -->
        <div class="destiny-bar">
            <span class="destiny-label">DESTINY:</span>
            <span id="destiny-value">UNKNOWN</span>
        </div>

        <!-- Child Image Container -->
        <div class="image-container">
            <img id="child-image" src="" alt="Child" />
            <div id="image-loading" class="loading-overlay">
                <div class="spinner"></div>
                <p>Generating image...</p>
            </div>
        </div>

        <!-- Age Display -->
        <div class="age-display">
            <span id="current-age">Age: 0</span>
        </div>

        <!-- Question/Prompt Area -->
        <div class="question-container">
            <p id="question-text">Loading...</p>
        </div>

        <!-- Input Area -->
        <div class="input-container">
            <input
                type="text"
                id="player-input"
                placeholder="Type your answer here..."
                autocomplete="off"
            />
            <button id="submit-btn">Submit</button>
        </div>

        <!-- Score Display (hidden until end) -->
        <div id="final-score" class="final-score hidden">
            <h2>Game Over!</h2>
            <p id="final-destiny"></p>
            <p id="score-display"></p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
