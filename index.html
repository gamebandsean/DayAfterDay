<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day After Day - Life Sim</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <!-- Progress Bar -->
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar">
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
                <div class="progress-segment"></div>
            </div>
        </div>

        <!-- Destiny Display -->
        <div class="destiny-bar">
            <span class="destiny-label">DESTINY:</span>
            <span id="destiny-value">UNKNOWN</span>
        </div>

        <!-- Child Image Container -->
        <div class="image-container">
            <img id="child-image" src="" alt="Child" />
            <div id="image-loading" class="loading-overlay">
                <div class="spinner"></div>
                <p>Generating image...</p>
            </div>
        </div>

        <!-- Age Display -->
        <div class="age-display">
            <span id="current-age">Age: 0</span>
        </div>

        <!-- Question/Prompt Area -->
        <div class="question-container">
            <p id="question-text">Loading...</p>
        </div>

        <!-- Input Area -->
        <div class="input-container">
            <input
                type="text"
                id="player-input"
                placeholder="Type your answer here..."
                autocomplete="off"
            />
            <button id="submit-btn">Submit</button>
        </div>

        <!-- Score Display (hidden until end) -->
        <div id="final-score" class="final-score hidden">
            <h2>Game Over!</h2>
            <p id="final-destiny"></p>
            <p id="score-display"></p>
            <button id="restart-btn">Play Again</button>
        </div>

        <!-- Debug Modal (Press D to open) -->
        <div id="debug-modal" class="debug-modal hidden">
            <div class="debug-content">
                <div class="debug-header">
                    <h3>🔮 Oracle's Vision</h3>
                    <button id="close-debug" class="close-debug">&times;</button>
                </div>
                <div class="debug-body">
                    <div class="debug-section">
                        <strong>Destiny:</strong>
                        <p id="debug-destiny">-</p>
                    </div>
                    <div class="debug-section">
                        <strong>Moral Alignment:</strong>
                        <p id="debug-alignment">-</p>
                    </div>
                    <div class="debug-section">
                        <strong>Oracle's Justification:</strong>
                        <p id="debug-justification">-</p>
                    </div>
                    <div class="debug-section">
                        <strong>Physical Description:</strong>
                        <p id="debug-physical">-</p>
                    </div>
                </div>
                <div class="debug-footer">
                    <small>Press D or ESC to close</small>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
